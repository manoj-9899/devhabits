name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.5.0'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm run install:all
      
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
